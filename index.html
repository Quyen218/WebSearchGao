<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="apple-touch-icon" href="/logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1113" />
  <meta name="description"
    content="Gạo Lý Nhân – Chuyên cung cấp gạo sạch, gia vị chất lượng cao. Tìm kiếm sản phẩm nhanh chóng, đặt hàng tiện lợi qua Zalo." />
  <title>Gạo Lý Nhân – Gạo sạch chất lượng cao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <!-- Anti-devtools protection -->
  <script>
    (function () {
      // Chặn chuột phải
      document.addEventListener('contextmenu', function (e) { e.preventDefault(); });

      // Chặn phím tắt mở devtools
      document.addEventListener('keydown', function (e) {
        // F12
        if (e.key === 'F12') { e.preventDefault(); return false; }
        // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'i', 'j', 'c'].includes(e.key)) { e.preventDefault(); return false; }
        // Ctrl+U (view source)
        if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
        // Ctrl+S (save page)
        if (e.ctrlKey && (e.key === 's' || e.key === 'S')) { e.preventDefault(); return false; }
      });

      // Phát hiện devtools qua kích thước cửa sổ
      var _threshold = 160;
      var _blocked = false;
      function _detectDevtools() {
        var widthDiff = window.outerWidth - window.innerWidth;
        var heightDiff = window.outerHeight - window.innerHeight;
        if ((widthDiff > _threshold || heightDiff > _threshold) && !_blocked) {
          _blocked = true;
          document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0f1113;color:#fff;font-family:sans-serif;gap:12px"><span style="font-size:3rem">🔒</span><h2 style="margin:0">Truy cập bị từ chối</h2><p style="color:#888;margin:0">Vui lòng đóng Developer Tools để tiếp tục.</p></div>';
        } else if (widthDiff <= _threshold && heightDiff <= _threshold && _blocked) {
          _blocked = false;
          location.reload();
        }
      }
      setInterval(_detectDevtools, 1000);
    })();
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
